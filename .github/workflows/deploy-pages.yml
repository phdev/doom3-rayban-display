name: Deploy GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci

      # Build the DOOM 3 WebAssembly engine (dhewm3 + GL4ES via Emscripten).
      # These steps are best-effort: if the engine build fails, the web app
      # shell still deploys (and reports a missing-engine artifact at runtime).
      # No DOOM 3 game data is included — users supply their own PK4 via ?pk4=.
      - name: Install Emscripten
        id: emsdk
        continue-on-error: true
        run: |
          git clone --depth 1 https://github.com/emscripten-core/emsdk.git .build/emsdk
          .build/emsdk/emsdk install latest
          .build/emsdk/emsdk activate latest
      - name: Build GL4ES + dhewm3 engine
        id: engine
        continue-on-error: true
        run: |
          source .build/emsdk/emsdk_env.sh
          npm run build:gl4es
          GL4ES_PATH="$PWD/.build/gl4es" npm run build:dhewm3
          ls -lah public/wasm/dhewm3.js public/wasm/dhewm3.wasm public/wasm/dhewm3.data

      - run: npm run build
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
